<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio de Sayda</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin:0;
            padding:0;
            background-color:#f4f4f4;
        }

        header{
            background-color:#0d1b2a;
            color:white;
            text-align:center;
            padding:50px 20px;
        }

        header h1{
            margin:0;
            font-size:50px;
        }

        header p{
            font-size:20px;
            margin-top:10px;
        }

        .projects{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:30px;
            padding:50px;
        }

        .card{
            background:white;
            width:280px;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            transform:scale(1.03);
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:contain;
            background:white;
            padding:20px;
        }

        .card h2{
            color:#0d1b2a;
            margin-top:10px;
        }

        .card p{
            padding:0 15px 20px;
            color:#333;
        }

    </style>

</head>

<body>

    <header>
        <h1>Portfolio de Sayda</h1>
        <p>Étudiante en cybersécurité et réseau</p>
    </header>

    <section class="projects">

        <div class="card">
            <img src="images/glpi.png">
            <h2>GLPI</h2>
            <p>Gestion du parc informatique</p>
        </div>

        <div class="card">
            <img src="images/pfsense.png">
            <h2>PfSense</h2>
            <p>Configuration firewall et VPN</p>
        </div>

        <div class="card">
            <img src="images/ad.png">
            <h2>Active Directory</h2>
            <p>Gestion des utilisateurs et groupes</p>
        </div>

    </section>

</body>

</html>
